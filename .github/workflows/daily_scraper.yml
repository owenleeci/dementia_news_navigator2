name: Daily Dementia News Navigator

on:
  schedule:
    # 每天早上 8 點執行 (UTC 00:00 -> 台灣時間 08:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 允許手動從 GitHub 網頁上觸發

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: 📥 取得程式碼
      uses: actions/checkout@v4
      with:
        # 如果需要讓 Action 能把資料庫 commit 回去，需要較大權限
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 🐍 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 安裝相依套件
      run: |
        python -m pip install --upgrade pip
        pip install feedparser pandas requests beautifulsoup4 google-genai streamlit cloudscraper selenium webdriver-manager

    - name: 🚀 執行主程式抓取與 AI 摘要
      env:
        # 將 GitHub Secrets 裡的 AI 金鑰讀進環境變數
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # 由於這是在伺服器跑，我們的 Selenium 已經寫好無頭模式，這裡直接執行主程式
        python main_pipeline.py

    - name: 💾 Commit 並 Push 最新資料庫
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git pull
        # 檢查是否有檔案變動 (資料庫是否有新增)
        if [[ `git status --porcelain` ]]; then
          git add output/dementia_news.db
          git commit -m "🤖 自動更新：本日失智症新聞 AI 摘要與資料庫"
          git push
        else
          echo "今日無新新聞或資料庫未更動。"
        fi
